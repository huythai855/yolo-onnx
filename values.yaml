# Values for deployment-custom
nameOverride: ""
fullnameOverride: ""

# --- Storage / PVC (JuiceFS) ---
pvName: "pv-example"
pvcName: "pvc-example"
serviceName: "service-example"
namespace: "juicefs"
deploymentId: "12345"
username: "testuser"
storageSize: "5Gi"
storageClass: "juicefs-sc"
volumeHandle: "jfs-volume"
secretName: "juicefs-sc-secret"

# --- Workload / InferenceService (YOLO ONNX API) ---
appLabel: "yolo-api-onnx"

# Docker image chạy YOLO ONNX API (FastAPI).
image: "huythai855/yolo-api-onnx:latest"

# Không override CMD, để image tự chạy uvicorn.

# Port HTTP mà container lắng nghe.
containerPort: 8000

# Đường mount của PVC trong container (chứa model onnx).
mountPath: "/models"

# --- Environment variables for container ---
# Có thể override / thêm env khi install:
#   helm install ... --set envs.MY_KEY=my_value
envs:
  MODEL_PATH: "/models/yolo11n.onnx"
  BACKEND: "onnx"

# --- Resources ---
cpuRequest: "200m"
cpuLimit: "1000m"
memoryRequest: "1Gi" # in Gi
memoryLimit: "2Gi"   # in Gi
gpuLimit: 0
